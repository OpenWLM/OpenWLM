<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Yellow face -->
  <circle cx="10" cy="12" r="8" fill="#ffe500" stroke="#cc9900" stroke-width="0.5"/>
  
  <!-- Left eye (open) -->
  <circle cx="8" cy="11" r="1.5" fill="white" stroke="black" stroke-width="0.3"/>
  <circle cx="8.2" cy="10.8" r="0.5" fill="black"/>
  
  <!-- Right eye (winking) -->
  <path d="M12 11C12.5 10.5 13.5 10.5 14 11" stroke="black" stroke-width="1" stroke-linecap="round"/>

  <!-- Mouth (smile) -->
  <path d="M7 15C8 16.5 12 16.5 13 15" stroke="black" stroke-width="0.8" stroke-linecap="round" fill="none"/>

  <!-- Dropdown arrow -->
  <path d="M18 11L21 14L24 11" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
